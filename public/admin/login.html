<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Gatti</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header-top">
        <div class="brand">GATTI ADMIN</div>
    </header>

    <main class="container">
        <div id="login-section">
            <h1 style="text-align: center; margin-bottom: 2rem;">Acesso Restrito</h1>

            <form id="admin-login-form" class="card" style="max-width: 400px; margin: 0 auto;">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Entrar no Painel</button>
            </form>
        </div>
    </main>

    <script src="/admin/js/admin-login.js"></script>
</body>
</html>
